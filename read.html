        P("This gift is not mine. I did not make the holy name, or earn it, or give it its power. I only received it, passed down by saints and teachers across the ages, and I have done no more than place it into your hands, as it was placed into mine. To sign my own name across a treasure I merely carried would not be right."),
        P("And I would rather you weigh the gift, not the giver. Look past me, to the Name itself. That is where all the power is, and it will never disappoint you."),
        P("So I will say little about myself. I am no teacher and no saint, only a grateful servant who found something too good to keep quiet about, and turned around to share it. If even one of these pages helps you take up the Name, it has done its work, and I am glad."),
        P("May the Name you now hold never leave you. May it quiet your fears, clear your heart, and carry you home at the end. You were only ever one sound away.")
      ]},
      { title:"My signature", blocks:[
        P("I will sign only what I pray, one day, to truly become. The servant at the feet of the devotees of the Lord, of Krishna, who is the true friend of the fallen."),
        P("Dina Bandhu Bhakta Charan Sevak."),
        P("And I leave you, as I found you, with the sound that began it all."),
        SLOKA(["Hare Kṛṣṇa Hare Kṛṣṇa, Kṛṣṇa Kṛṣṇa Hare Hare","Hare Rāma Hare Rāma, Rāma Rāma Hare Hare"],"the maha-mantra")
      ]}
    ]}
  ];

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
  function splitSents(t){return t.replace(/\s+/g,' ').trim().split(/(?<=[.!?])\s+(?=[A-Z"'(])/);}
  function partKick(s){return s.split('—')[0].trim();}
  function partTitle(s){return s.split('—').slice(1).join('—').trim();}
  function partWords(p){var n=0;BOOK[p].secs.forEach(function(sec){n+=sec.title.split(/\s+/).length;sec.blocks.forEach(function(b){if(b.t!=='sloka')n+=b.x.split(/\s+/).length;});});return n;}

  var synth=window.speechSynthesis;
  var content=document.getElementById('content'), reader=document.getElementById('reader'), aside=document.getElementById('toc');
  var stat=document.getElementById('stat'), noteEl=document.getElementById('note'), noteSv=document.getElementById('noteSv');
  var btnPlay=document.getElementById('btnPlay'), autoAdv=document.getElementById('autoAdv'), rateEl=document.getElementById('rate'), voiceEl=document.getElementById('voice');
  var curPart=0, sents=[], idx=0, speaking=false, paused=false, curU=null, rate=1;

  /* ---------- TOC ---------- */
  function buildTOC(){
    var h='<div class="toctitle">Contents</div>';
    BOOK.forEach(function(part,p){
      var heard=localStorage.getItem('om_heard_p'+p)==='1';
      h+='<div class="tocrow'+(heard?' heard':'')+'" data-p="'+p+'">'
        +'<input type="checkbox" class="phd" data-p="'+p+'"'+(heard?' checked':'')+'>'
        +'<div class="tt"><span class="ch">'+esc(partKick(part.part))+'</span>'+esc(partTitle(part.part))+'</div>'
        +'<span class="ww">'+partWords(p)+' w</span></div>';
      part.secs.forEach(function(sec,si){
        h+='<div class="subrow" data-p="'+p+'" data-s="'+si+'"><span class="stt">'+esc(sec.title)+'</span></div>';
      });
    });
    aside.innerHTML=h;
    aside.querySelectorAll('.tocrow').forEach(function(r){
      r.addEventListener('click',function(e){ if(e.target.classList.contains('phd'))return; loadPart(+r.dataset.p,false); });
    });
    aside.querySelectorAll('.phd').forEach(function(cb){
      cb.addEventListener('click',function(e){ e.stopPropagation(); var p=+cb.dataset.p; localStorage.setItem('om_heard_p'+p, cb.checked?'1':'0'); aside.querySelector('.tocrow[data-p="'+p+'"]').classList.toggle('heard',cb.checked); });
    });
    aside.querySelectorAll('.subrow').forEach(function(sr){
      sr.addEventListener('click',function(){ var p=+sr.dataset.p, s=+sr.dataset.s; if(p!==curPart){ loadPart(p,false); } var h2=content.querySelector('#sec-'+p+'-'+s); if(h2) h2.scrollIntoView({block:'start',behavior:'smooth'}); });
    });
  }
  function setActiveTOC(){
    aside.querySelectorAll('.tocrow').forEach(function(r){ r.classList.toggle('active', +r.dataset.p===curPart); });
  }

  /* ---------- render a part ---------- */
  function partHTML(p){
    var part=BOOK[p];
    var h='<div class="sec-part">'+esc(partKick(part.part))+'</div><h1 class="sec">'+esc(partTitle(part.part))+'</h1>';
    part.secs.forEach(function(sec,si){
      h+='<h2 class="subsec" id="sec-'+p+'-'+si+'"><span class="snt" data-s="'+si+'">'+esc(sec.title)+'</span></h2>';
      sec.blocks.forEach(function(b){
        if(b.t==='sloka'){
          h+='<blockquote class="sloka">'+b.v.map(function(l){return '<span class="vl">'+esc(l)+'</span>';}).join('')+'<cite>— '+esc(b.cite)+'</cite></blockquote>';
        } else {
          var cls=b.t==='mean'?' class="mean"':b.t==='why'?' class="why"':'';
          h+='<p'+cls+'>'+splitSents(b.x).map(function(s){return '<span class="snt" data-s="'+si+'">'+esc(s)+'</span> ';}).join('')+'</p>';
        }
      });
    });
    return h;
  }
  function loadPart(p,autoplay){
    curU=null; if(synth) synth.cancel(); speaking=false; paused=false;
    curPart=clamp(p,0,BOOK.length-1);
    content.innerHTML=partHTML(curPart);
    sents=[];
    content.querySelectorAll('.snt').forEach(function(el){ var i=sents.length; sents.push({text:el.textContent,el:el,s:+el.dataset.s}); el.addEventListener('click',function(){ speakFrom(i); }); });
    idx=0;
    noteEl.value=localStorage.getItem('om_note_p'+curPart)||''; noteSv.textContent='';
    setActiveTOC();
    document.getElementById('prevCh').disabled=curPart===0;
    document.getElementById('nextCh').disabled=curPart===BOOK.length-1;
    reader.scrollTop=0;
    localStorage.setItem('om_part',curPart);
    setPlayUI(); paint();
    if(autoplay) speakFrom(0);
  }

  /* ---------- player ---------- */
  function curVoice(){ var id=localStorage.getItem('om_voice'); if(!id)return null; var vs=synth?synth.getVoices():[]; for(var i=0;i<vs.length;i++) if(vs[i].name===id) return vs[i]; return null; }
  function setPlayUI(){ btnPlay.innerHTML=(speaking&&!paused)?'&#10073;&#10073; Pause':'&#9654; Play'; }
  function paint(){
    sents.forEach(function(o,i){ o.el.classList.toggle('on', i===idx); });
    var o=sents[idx];
    if(o){
      var r=o.el.getBoundingClientRect(), rr=reader.getBoundingClientRect();
      if(r.top<rr.top+70||r.bottom>rr.bottom-40){ o.el.scrollIntoView({block:'center',behavior:'smooth'}); }
      aside.querySelectorAll('.subrow').forEach(function(sr){ sr.classList.toggle('active', +sr.dataset.p===curPart && +sr.dataset.s===o.s); });
    }
    stat.innerHTML='Part '+(curPart+1)+' of '+BOOK.length+'<br>'+(sents.length?(idx+1)+' / '+sents.length+' lines':'');
  }
  function speakFrom(i){
    if(!synth||!sents.length) return;
    curU=null; synth.cancel();
    idx=clamp(i,0,sents.length-1);
    var u=new SpeechSynthesisUtterance(sents[idx].text);
    u.rate=rate; var v=curVoice(); if(v)u.voice=v;
    u.onend=function(){
      if(u!==curU) return;
      if(idx<sents.length-1){ speakFrom(idx+1); }
      else if(autoAdv.checked && curPart<BOOK.length-1){ loadPart(curPart+1,true); }
      else { speaking=false; paused=false; setPlayUI(); }
    };
    curU=u; speaking=true; paused=false; synth.speak(u); setPlayUI(); paint();
    localStorage.setItem('om_part',curPart); localStorage.setItem('om_idx',idx);
  }
  function playPause(){
    if(!synth) return;
    if(speaking && !paused){ paused=true; synth.pause(); setPlayUI(); }
    else if(speaking && paused){ paused=false; synth.resume(); setPlayUI(); }
    else { speakFrom(idx); }
  }
  function stop(){ curU=null; if(synth) synth.cancel(); speaking=false; paused=false; setPlayUI(); }
  function jump(i){ i=clamp(i,0,sents.length-1); if(speaking&&!paused){ speakFrom(i); } else { idx=i; paint(); localStorage.setItem('om_idx',idx); } }

  btnPlay.addEventListener('click',playPause);
  document.getElementById('btnStop').addEventListener('click',stop);
  document.getElementById('btnPrevS').addEventListener('click',function(){ jump(idx-1); });
  document.getElementById('btnNextS').addEventListener('click',function(){ jump(idx+1); });
  document.getElementById('prevCh').addEventListener('click',function(){ if(curPart>0) loadPart(curPart-1,false); });
  document.getElementById('nextCh').addEventListener('click',function(){ if(curPart<BOOK.length-1) loadPart(curPart+1,false); });
  rateEl.addEventListener('input',function(){ rate=parseFloat(rateEl.value); if(speaking&&!paused) speakFrom(idx); });
  noteEl.addEventListener('input',function(){ localStorage.setItem('om_note_p'+curPart,noteEl.value); noteSv.textContent='saved'; setTimeout(function(){noteSv.textContent='';},1200); });

  /* ---------- voices ---------- */
  function loadVoices(){
    var vs=synth?synth.getVoices():[]; var en=vs.filter(function(v){return /^en/i.test(v.lang);}); if(!en.length)en=vs;
    voiceEl.innerHTML=''; en.forEach(function(v){ var o=document.createElement('option'); o.value=v.name; o.textContent=v.name.replace(/Microsoft|Google|Online|\(Natural\)/gi,'').trim()+' ('+v.lang+')'; voiceEl.appendChild(o); });
    var saved=localStorage.getItem('om_voice'); if(saved)voiceEl.value=saved;
  }
  voiceEl.addEventListener('change',function(){ localStorage.setItem('om_voice',voiceEl.value); if(speaking&&!paused) speakFrom(idx); });
  if(synth){ loadVoices(); if(typeof synth.onvoiceschanged!=='undefined') synth.onvoiceschanged=loadVoices; }

  /* ---------- theme ---------- */
  var tb=document.getElementById('btnTheme');
  function applyTheme(t){ if(t==='dark'){document.documentElement.setAttribute('data-theme','dark');tb.textContent='Light';}else{document.documentElement.removeAttribute('data-theme');tb.textContent='Dark';} }
  applyTheme(localStorage.getItem('om_theme')||'light');
  tb.addEventListener('click',function(){ var t=(localStorage.getItem('om_theme')==='dark')?'light':'dark'; localStorage.setItem('om_theme',t); applyTheme(t); });

  /* ---------- keepalive (Chrome cuts long TTS) ---------- */
  setInterval(function(){ try{ if(speaking&&!paused&&synth&&!synth.paused){ synth.resume(); } }catch(e){} },8000);
  window.addEventListener('beforeunload',function(){ if(synth) synth.cancel(); });

  /* ---------- init ---------- */
  buildTOC();
  rate=parseFloat(rateEl.value)||1;
  var startPart=parseInt(localStorage.getItem('om_part')||'0',10); if(isNaN(startPart)||startPart<0||startPart>=BOOK.length)startPart=0;
  loadPart(startPart,false);
  var savedIdx=parseInt(localStorage.getItem('om_idx')||'0',10); if(!isNaN(savedIdx)){ idx=clamp(savedIdx,0,sents.length-1); paint(); }
})();
</script>
</body>
</html>
